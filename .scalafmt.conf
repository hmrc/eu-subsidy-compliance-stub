version = 3.7.0
maxColumn = 120
lineEndings = unix
importSelectors = singleLine
runner.dialect = scala3

project {
  git = true
}

preset = defaultWithAlign
align.preset = none
align.stripMargin = true

spaces {
  beforeContextBoundColon = Always
  inImportCurlyBraces = false
}

indent {
  callSite = 2
  defnSite = 2
}

rewrite {
  rules = [AsciiSortImports]
}

project.excludeFilters = [
  ".*\\.sc$"
]
